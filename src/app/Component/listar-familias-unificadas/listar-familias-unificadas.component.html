<div class="container wrapper">

  <div class="inner">

    <!-- 🔘 BOTÓN INICIO -->
    <div class="mb-3 text-end">
      <button class="btn-morado" routerLink="/listadopueblos">
        Volver a inicio
      </button>
    </div>

    <h3>Listado de familias lingüísticas</h3>

    <!-- 🔎 BUSCADOR -->
    <input
      type="text"
      class="form-control mb-3"
      placeholder="Buscar familia lingüística..."
      [(ngModel)]="filtro"
      (input)="filtrar()"
    />

    <!-- 📋 TABLA -->
    <table class="table table-bordered table-hover">

      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Familia Lingüística</th>
          <th>Multimedia</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let f of datosPaginados; let i = index"
            [class.fila-morada]="((paginaActual - 1) * registrosPorPagina + i) % 2 === 0"
            [class.fila-blanca]="((paginaActual - 1) * registrosPorPagina + i) % 2 !== 0">

          <td>{{ (paginaActual - 1) * registrosPorPagina + i + 1 }}</td>

          <td>{{ f }}</td>

          <td>
            <button class="btn-morado" (click)="abrirMultimedia(f)">
              🎭 Multimedia
            </button>
          </td>

        </tr>
      </tbody>

    </table>

    <!-- 📄 PAGINACIÓN -->
    <div class="paginador">

      <button (click)="anterior()" [disabled]="paginaActual === 1">
        ⬅ Anterior
      </button>

      <span>Página {{ paginaActual }} de {{ totalPaginas }}</span>

      <button (click)="siguiente()" [disabled]="paginaActual === totalPaginas">
        Siguiente ➡
      </button>

    </div>

  </div>

</div>

<!-- 🎭 MODAL MULTIMEDIA -->
<div class="overlay" *ngIf="mostrarModal">

  <div class="modal-box">

    <button class="close" (click)="cerrarModal()">✖</button>

    <h3>{{ multimediaFamilia }}</h3>

    <!-- 🖼 IMÁGENES -->
    <div class="lista">
      <img *ngFor="let img of imagenes"
           [src]="img"
           class="mini-img" />
    </div>

    <!-- 🎧 AUDIOS -->
    <div class="lista">
      <audio *ngFor="let a of audios"
             [src]="a"
             controls></audio>
    </div>

    <!-- 🎬 VIDEOS -->
    <div class="lista">
      <video *ngFor="let v of videos"
             [src]="v"
             controls
             class="video-preview">
      </video>
    </div>

  </div>

</div>
