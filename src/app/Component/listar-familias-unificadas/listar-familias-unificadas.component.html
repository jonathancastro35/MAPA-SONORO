<!-- LISTADO -->
<div class="container wrapper">

  <div class="inner">

    <div class="mb-3 text-end">
      <button class="btn-morado" routerLink="/listadopueblos">
        Volver a inicio
      </button>
    </div>

    <h3>Listado de familias lingüísticas</h3>

    <input class="form-control mb-3"
           [(ngModel)]="filtro"
           (input)="filtrar()"
           placeholder="Buscar..." />

    <table class="table table-bordered table-hover">

      <thead class="table-dark">
        <tr>
          <th>#</th>
          <th>Familia</th>
          <th>Multimedia</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let f of datosPaginados; let i = index">

          <td>{{ (paginaActual - 1) * registrosPorPagina + i + 1 }}</td>
          <td>{{ f }}</td>

          <td>
            <button class="btn-morado" (click)="abrirMultimedia(f)">
              🎭 Multimedia
            </button>
          </td>

        </tr>
      </tbody>

    </table>

    <div class="paginador">
      <button (click)="anterior()" [disabled]="paginaActual === 1">⬅</button>
      <span>{{ paginaActual }} / {{ totalPaginas }}</span>
      <button (click)="siguiente()" [disabled]="paginaActual === totalPaginas">➡</button>
    </div>

  </div>
</div>

<!-- MODAL MULTIMEDIA -->
<div class="overlay" *ngIf="mostrarModal">

  <div class="modal-box">

    <button class="close" (click)="cerrarModal()">✖</button>

    <h3>{{ multimediaFamilia }}</h3>

    <!-- 🖼 IMÁGENES -->
    <div class="lista">
      <img *ngFor="let img of imagenes"
           [src]="img"
           class="mini-img"
           (click)="verImagen(img)" />
    </div>

    <!-- 🎬 VIDEOS -->
    <div class="lista">
      <div *ngFor="let v of videos"
           class="video-card"
           (click)="verVideo(v)">
        🎬 Ver video
      </div>
    </div>

  </div>
</div>

<!-- IMAGEN -->
<div class="overlay" *ngIf="imagenSeleccionada">
  <div class="modal-box">
    <button class="close" (click)="cerrarImagen()">✖</button>
    <img [src]="imagenSeleccionada" />
  </div>
</div>

<!-- VIDEO -->
<div class="overlay" *ngIf="videoSeleccionado">
  <div class="modal-box">

    <button class="close" (click)="cerrarVideo()">✖</button>

    <iframe
      width="100%"
      height="400"
      [src]="videoSeleccionado | safeUrl"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>

  </div>
</div>
